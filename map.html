<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мапа — Okrip World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="css/style.css" />
    <script>try{if(localStorage.getItem("theme")==="light")document.documentElement.classList.add("light-theme")}catch(e){}</script>
    <style>
      /* Map page needs full height body layout */
      .wrap {
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="nav">
        <a href="index.html" class="nav-logo">OKRIP WORLD</a>
        <div class="nav-links">
          <a href="servers.html">СЕРВЕРИ</a>
        </div>
        <span class="nav-online">ОНЛАЙН 67</span>
        <div class="theme-toggle" id="theme-toggle">
          <button class="theme-toggle-btn" title="Переключити тему"></button>
        </div>
      </nav>

      <div class="body">
        <div class="maparea">
          <iframe
            id="bluemap-frame"
            src="/bluemap/#world:695:-51:-173:0:0.11:1.16:0:0:free"
            title="BlueMap"
            allowfullscreen
          ></iframe>

          <div class="map-placeholder" id="placeholder">
            <svg
              width="48"
              height="48"
              viewBox="0 0 48 48"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect
                x="4"
                y="4"
                width="40"
                height="40"
                stroke="#e8e4dc"
                stroke-width="1.5"
                fill="none"
              />
              <polyline
                points="4,28 14,18 22,24 30,14 44,24"
                stroke="#4a9"
                stroke-width="1.5"
                fill="none"
              />
              <circle
                cx="34"
                cy="16"
                r="4"
                stroke="#e8e4dc"
                stroke-width="1.5"
                fill="none"
              />
            </svg>
            <div class="pulse" id="pulse-dot"></div>
            <span>ЗАВАНТАЖЕННЯ МАПИ</span>
          </div>

          <div class="map-error" id="map-error">МАПА НАРАЗІ НЕДОСТУПНА</div>
        </div>
      </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/map.js"></script>
  </body>
</html>
