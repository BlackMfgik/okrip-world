<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Okrip World Mini</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        background: #000000;
      }
      .wrap {
        background: #0a0a0a;
        color: #e8e4dc;
        font-family: "Space Mono", monospace;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .nav {
        display: flex;
        align-items: center;
        padding: 0 28px;
        height: 52px;
        border-bottom: 1px solid #1e1e1e;
        flex-shrink: 0;
      }
      .nav-logo {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 3px;
        color: #e8e4dc;
      }
      .nav-links {
        display: flex;
        gap: 28px;
        margin-left: auto;
        font-size: 11px;
        letter-spacing: 2px;
        color: #555;
      }
      .nav-links button {
        background: none;
        border: none;
        padding: 0;
        margin: 0;
        font: inherit;
        color: inherit;
        letter-spacing: inherit;
        cursor: pointer;
        outline: none;
      }
      .nav-links button:hover {
        color: #e8e4dc;
      }
      .nav-status,
      .left {
        margin-left: 28px;
        font-size: 11px;
        color: #555;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: color 0.2s ease;
        user-select: none;
      }
      .nav-status {
        cursor: pointer;
      }
      .nav-status:hover {
        color: #e8e4dc;
      }
      .nav-status:active {
        color: #4a9;
      }
      .dot {
        width: 6px;
        height: 6px;
        background: #4a9;
        border-radius: 50%;
      }
      .body {
        display: flex;
        flex: 1;
        min-height: 0;
      }
      .maparea {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #161616;
      }

      #bluemap-frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      #bluemap-frame.loaded {
        opacity: 1;
      }

      .map-placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: #333;
        font-size: 11px;
        letter-spacing: 2px;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }
      .map-placeholder.hidden {
        opacity: 0;
      }
      .map-placeholder svg {
        opacity: 0.15;
      }
      .map-placeholder .pulse {
        width: 8px;
        height: 8px;
        background: #4a9;
        border-radius: 50%;
        opacity: 0;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1.2);
        }
      }
      .map-error {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #1a0a0a;
        border: 1px solid #3a1a1a;
        color: #c06060;
        font-size: 11px;
        letter-spacing: 1.5px;
        padding: 10px 20px;
        display: none;
        white-space: nowrap;
      }
      .map-error.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="nav">
        <div class="nav-logo">Okrip world Mini</div>
        <div class="nav-links">
          <button>СЕРВЕРИ</button>
          <button>МАПА</button>
        </div>
        <div class="nav-status" id="ip-block">
          <div class="dot"></div>
          <span id="ip-address">okripworld.minecraft.best</span>
        </div>
        <span class="left">ОНЛАЙН 67</span>
      </div>

      <div class="body">
        <div class="maparea">
          <iframe
            id="bluemap-frame"
            src="/bluemap/#world:695:-51:-173:0:0.11:1.16:0:0:free"
            title="BlueMap"
            allowfullscreen
          ></iframe>
          <div class="map-placeholder" id="placeholder">
            <svg
              width="48"
              height="48"
              viewBox="0 0 48 48"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect
                x="4"
                y="4"
                width="40"
                height="40"
                stroke="#e8e4dc"
                stroke-width="1.5"
                fill="none"
              />
              <polyline
                points="4,28 14,18 22,24 30,14 44,24"
                stroke="#4a9"
                stroke-width="1.5"
                fill="none"
              />
              <circle
                cx="34"
                cy="16"
                r="4"
                stroke="#e8e4dc"
                stroke-width="1.5"
                fill="none"
              />
            </svg>
            <div class="pulse" id="pulse-dot"></div>
            <span>ЗАВАНТАЖЕННЯ МАПИ</span>
          </div>

          <div class="map-error" id="map-error">
            BLUEMAP НЕДОСТУПНИЙ — ПЕРЕВІР ПОРТ :25718
          </div>
        </div>
      </div>
    </div>

    <script>
      const ipBlock = document.getElementById("ip-block");
      const ipText = document.getElementById("ip-address").innerText;
      ipBlock.addEventListener("click", () => {
        navigator.clipboard
          .writeText(ipText)
          .then(() => {
            ipBlock.style.color = "#4a9";
            setTimeout(() => {
              ipBlock.style.color = "";
            }, 400);
          })
          .catch((err) => console.error("Помилка при копіюванні: ", err));
      });

      const frame = document.getElementById("bluemap-frame");
      const placeholder = document.getElementById("placeholder");
      const errorBanner = document.getElementById("map-error");

      frame.addEventListener("load", () => {
        frame.classList.add("loaded");
        placeholder.classList.add("hidden");
      });

      const timeout = setTimeout(() => {
        if (!frame.classList.contains("loaded")) {
          errorBanner.classList.add("visible");
          document.getElementById("pulse-dot").style.animationPlayState =
            "paused";
        }
      }, 15000);

      frame.addEventListener("load", () => clearTimeout(timeout));
    </script>
  </body>
</html>
